name: Build

on:
  push:
    branches:
      - main
      - 'fix/**'
      - 'feature/**'
      - 'release/**'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v6

      - name: Cache Loom artifacts
        uses: actions/cache@v5
        with:
          path: .gradle/loom-cache
          key: loom-${{ hashFiles('gradle.properties') }}
          restore-keys: loom-

      - run: ./gradlew build

      - uses: actions/upload-artifact@v7
        with:
          name: slipstream-fabric-${{ github.sha }}
          path: |
            build/libs/slipstream-*.jar
            !build/libs/slipstream-*-sources.jar
          archive: false
          if-no-files-found: error

      - uses: actions/upload-artifact@v7
        with:
          name: slipstream-paper-${{ github.sha }}
          path: paper-plugin/build/libs/slipstream-paper-*.jar
          archive: false
          if-no-files-found: error
