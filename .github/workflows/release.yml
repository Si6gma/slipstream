name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v6

      - name: Cache Loom artifacts
        uses: actions/cache@v5
        with:
          path: .gradle/loom-cache
          key: loom-${{ hashFiles('gradle.properties') }}
          restore-keys: loom-

      - name: Generate changelog
        id: changelog
        env:
          COMMIT_REGEX: '^(Merge|Update .* to |l10n:)'
        run: |
          PREVIOUS=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREVIOUS" ]; then
            LOG=$(git log --pretty=format:"- %s (%an, %(trailers:key=Co-authored-by,valueonly,separator=%x2C ))" "$PREVIOUS..HEAD" \
              | sed 's/ <[^>]*>//g' \
              | sed 's/, *)/)/g')
            if [ -n "$COMMIT_REGEX" ]; then
              LOG=$(echo "$LOG" | grep -vE "$COMMIT_REGEX" || true)
            fi
            {
              echo "changelog<<EOF"
              echo "$LOG"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "changelog=Initial release." >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: ./gradlew build

      - name: Publish to Modrinth
        run: ./gradlew publishMods
        continue-on-error: true
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            build/libs/slipstream-*.jar
            paper-plugin/build/libs/slipstream-paper-*.jar
          body: ${{ steps.changelog.outputs.changelog }}
          fail_on_unmatched_files: true
