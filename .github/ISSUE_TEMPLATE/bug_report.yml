name: Bug Report
description: Something isn't working correctly.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a bug report, check that you're on the latest version of the mod and that no other mod is causing the conflict.

  - type: input
    id: mod-version
    attributes:
      label: Mod version
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: input
    id: mc-version
    attributes:
      label: Minecraft version
      placeholder: e.g. 26.1.2
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Singleplayer
        - Fabric server
        - Paper server
        - Paper server + companion plugin
    validations:
      required: true

  - type: input
    id: fabric-api-version
    attributes:
      label: Fabric API version
      description: Check your mods folder or the Fabric API mod page.
      placeholder: e.g. 0.150.0+26.1.2

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Equip elytra
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Crash report or logs
      description:
        Paste the full crash report or relevant log lines. Wrap in code blocks
        if needed.
      render: text

  - type: textarea
    id: other-mods
    attributes:
      label: Other mods installed
      description:
        List any mods you think might be relevant. You can paste the full mod
        list if unsure.
