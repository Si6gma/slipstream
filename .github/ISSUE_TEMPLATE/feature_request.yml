name: Feature Request
description: Suggest something new or an improvement to existing behaviour.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where this would help. "I want X" on its own isn't enough — explain why.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any other approaches or workarounds you've thought about?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, videos, links to similar mods, or anything else that might help.
